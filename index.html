---
layout: default
---

<div class="home">
    <div class="post" itemscope itemtype="http://schema.org/BlogPosting">

        {% for post in paginator.posts %}

        <div class="post-header post-preview">
            <div class="post-preview-image">
                <a href='{{post.url}}'><img class='post-cover' src="{{post.cover}}"/></a>
            </div>

            <div class="post-preview-text">
                <h1 itemprop="name" class="post-title">
                    <a itemprop="url" class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title
                        }}</a>
                </h1>
                <p>{{ post.content | strip_html | truncate: 400 }}
                    <a href="{{ post.url | prepend: site.baseurl }}" title="Permalink to: {{ post.title }}"
                       class="read-more">Read more</a>
                </p>
                <time class="post-meta" datetime="{{ post.date | date: '%Y-%m-%d' }}">
                    {{ post.date | date: "%B %-d, %Y" }}
                </time>
            </div>
        </div>

        {% endfor %}

    </div>
</div>
